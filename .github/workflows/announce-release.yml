name: Announce release

# NOTE: `release` events only run workflow files from the default branch - this
# file must be on `main` to fire.
on:
  release:
    types: [published]
  workflow_dispatch: # dry run: verifies the webhook secret is set, posts nothing

permissions:
  contents: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Announce the release on Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TITLE: ${{ github.event.release.name }}
          TAG: ${{ github.event.release.tag_name }}
          URL: ${{ github.event.release.html_url }}
          BODY: ${{ github.event.release.body }}
          # Repo variable (not a secret): Discord role id to ping. Empty = no ping.
          ROLE_ID: ${{ vars.DISCORD_RELEASE_ROLE_ID }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is missing/empty - Discord announcement NOT sent."
            exit 1
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Webhook secret is set (non-empty). Dry run - nothing posted."
            if [ -n "$ROLE_ID" ]; then
              echo "Release role ping configured (id ends ...${ROLE_ID: -4})."
            else
              echo "No release role ping configured (DISCORD_RELEASE_ROLE_ID unset)."
            fi
            exit 0
          fi
          title="$TITLE"
          [ -z "$title" ] && title="$TAG"
          # jq escapes + truncates by codepoint; allowed_mentions keeps notes from pinging.
          payload=$(jq -n \
            --arg title "$title" \
            --arg url "$URL" \
            --arg body "$BODY" \
            --arg role "$ROLE_ID" \
            '
            ($body
              | if length == 0 then "A new version of WFHelper is available - see the release for details."
                elif length > 1500 then .[0:1500] + "…\n\n**[Full changelog →](" + $url + ")**"
                else . end) as $desc
            | {
                username: "WFHelper Releases",
                content: ("**WFHelper " + $title + " is out** 🎉"
                  + (if $role == "" then "" else " <@&" + $role + ">" end)),
                allowed_mentions: (if $role == "" then { parse: [] } else { roles: [$role] } end),
                embeds: [ {
                  title: ("WFHelper " + $title),
                  url: $url,
                  description: $desc,
                  color: 13936707,
                  footer: { text: "Download at wfhelper.com" }
                } ]
              }')
          curl -sS -f -X POST -H "Content-Type: application/json" \
            -d "$payload" "$DISCORD_WEBHOOK_URL"
