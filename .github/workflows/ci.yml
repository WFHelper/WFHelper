name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Worker dependencies
        run: npm ci --prefix backend-lite/worker

      - name: Verify ONNX models
        run: pnpm run verify:onnx-models

      - name: Typecheck
        run: pnpm run typecheck

      - name: Svelte check
        run: pnpm run check

      - name: Lint
        run: pnpm run lint

      - name: Dead code audit
        run: pnpm run audit:deadcode

      - name: Test
        run: pnpm run test

      - name: Backend tests
        run: pnpm run backend:test

      - name: Build
        run: pnpm run build

  e2e:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: E2E smoke tests
        run: xvfb-run --auto-servernum pnpm exec playwright test --config playwright.config.ts
        env:
          DEBUG: pw:browser*
          ELECTRON_ENABLE_LOGGING: "1"
          ELECTRON_ENABLE_STACK_DUMPING: "1"
