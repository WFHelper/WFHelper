name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # gitleaks-action requires a paid license for organization repos, so we
      # fetch the CLI binary directly (latest linux release) instead.
      - name: Install gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url=$(gh api repos/gitleaks/gitleaks/releases/latest \
            --jq '.assets[] | select(.name | test("linux_x64.tar.gz$")) | .browser_download_url')
          curl -sSfL "$url" -o "$RUNNER_TEMP/gitleaks.tar.gz"
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          sudo mv "$RUNNER_TEMP/gitleaks" /usr/local/bin/gitleaks
          gitleaks version

      # Scan the checked-out tree (not full history - that was audited once and
      # is clean; GitHub Push Protection guards pushed history). This fails the
      # run if any secret lands in the working tree of a branch or PR.
      - name: Scan working tree for secrets
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --redact --exit-code 1
