name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release-windows:
    needs: ci
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release credentials
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
            throw "Missing required release secret: GH_TOKEN"
          }

          $hasSigningCert = -not [string]::IsNullOrWhiteSpace($env:CSC_LINK)
          $hasSigningPassword = -not [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)
          if ($hasSigningCert -ne $hasSigningPassword) {
            throw "CSC_LINK and CSC_KEY_PASSWORD must be configured together"
          }

          if (-not $hasSigningCert) {
            Write-Warning "CSC_LINK/CSC_KEY_PASSWORD are not configured; building an unsigned Windows installer."
          }

      - name: Validate release runtime configuration
        env:
          VITE_WFM_BACKEND_URL: ${{ secrets.VITE_WFM_BACKEND_URL }}
          VITE_WFM_BACKEND_DIRECT_FALLBACK: ${{ secrets.VITE_WFM_BACKEND_DIRECT_FALLBACK }}
          VITE_WFM_BACKEND_BOOTSTRAP_ENABLED: ${{ secrets.VITE_WFM_BACKEND_BOOTSTRAP_ENABLED }}
        run: pnpm run validate:release-env

      - name: Ensure release exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$env:GITHUB_REF_NAME" --repo "$env:GITHUB_REPOSITORY" *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $env:GITHUB_REF_NAME already exists"
          } else {
            gh release create "$env:GITHUB_REF_NAME" `
              --repo "$env:GITHUB_REPOSITORY" `
              --title "$env:GITHUB_REF_NAME" `
              --generate-notes
            if ($LASTEXITCODE -ne 0) { throw "Failed to create release $env:GITHUB_REF_NAME" }
            Write-Host "Created release $env:GITHUB_REF_NAME"
          }

      - name: Remove existing release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $productName = $pkg.build.productName
          $version = $pkg.version
          $assets = @(
            "latest.yml",
            "$productName-$version-Setup.exe",
            "$productName-$version-Setup.exe.blockmap"
          )

          foreach ($asset in $assets) {
            gh release delete-asset "$env:GITHUB_REF_NAME" "$asset" --yes --repo "$env:GITHUB_REPOSITORY"
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Deleted existing release asset: $asset"
            } else {
              Write-Host "Release asset not present or could not be deleted: $asset"
              $global:LASTEXITCODE = 0
            }
          }

      - name: Build Windows installer
        run: |
          pnpm run verify:onnx-models
          pnpm run build
          pnpm exec electron-builder --win nsis --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # baked into the renderer bundle; without these a CI installer
          # bypasses the worker backend
          VITE_WFM_BACKEND_URL: ${{ secrets.VITE_WFM_BACKEND_URL }}
          VITE_WFM_BACKEND_DIRECT_FALLBACK: ${{ secrets.VITE_WFM_BACKEND_DIRECT_FALLBACK }}
          VITE_WFM_BACKEND_BOOTSTRAP_ENABLED: ${{ secrets.VITE_WFM_BACKEND_BOOTSTRAP_ENABLED }}

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $productName = $pkg.build.productName
          $version = $pkg.version
          $paths = @(
            "release/latest.yml",
            "release/$productName-$version-Setup.exe",
            "release/$productName-$version-Setup.exe.blockmap"
          )

          foreach ($path in $paths) {
            if (-not (Test-Path $path)) {
              throw "Missing release asset: $path"
            }
          }

          gh release upload "$env:GITHUB_REF_NAME" $paths --clobber --repo "$env:GITHUB_REPOSITORY"

  notify-discord:
    needs: release-windows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Announce the release on Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set - skipping Discord announcement."
            exit 0
          fi
          # Pull the release the release-windows job just created/uploaded. The
          # changelog posted is whatever is in the release body at this moment, so
          # write custom notes before the tag if you want them (auto-generated
          # commit notes post otherwise).
          title=$(gh release view "$TAG" --repo "$REPO" --json name --jq '.name // ""')
          [ -z "$title" ] && title="$TAG"
          url=$(gh release view "$TAG" --repo "$REPO" --json url --jq '.url')
          body=$(gh release view "$TAG" --repo "$REPO" --json body --jq '.body // ""')
          # jq builds the payload: it JSON-escapes the notes, truncates by
          # codepoint (never mid-emoji) with a "full changelog" link when long, and
          # allowed_mentions:{parse:[]} guarantees the post pings no one even if the
          # notes contain @mentions.
          payload=$(jq -n \
            --arg title "$title" \
            --arg url "$url" \
            --arg body "$body" \
            '
            ($body
              | if length == 0 then "A new version of WFHelper is available - see the release for details."
                elif length > 1500 then .[0:1500] + "…\n\n**[Full changelog →](" + $url + ")**"
                else . end) as $desc
            | {
                username: "WFHelper Releases",
                content: ("**WFHelper " + $title + " is out** 🎉"),
                allowed_mentions: { parse: [] },
                embeds: [ {
                  title: ("WFHelper " + $title),
                  url: $url,
                  description: $desc,
                  color: 13936707,
                  footer: { text: "Download at wfhelper.com" }
                } ]
              }')
          curl -sS -f -X POST -H "Content-Type: application/json" \
            -d "$payload" "$DISCORD_WEBHOOK_URL"
