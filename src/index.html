<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP is enforced at runtime via onHeadersReceived in main.ts with a
         strict connect-src allowlist. A <meta> tag here would be less
         restrictive (connect-src 'self' https:) and becomes the sole policy
         if the runtime header ever fails to apply, so we omit it. -->
    <title>WFHelper</title>
    <!-- crossorigin so html-to-image can embed these fonts into captures -->
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
