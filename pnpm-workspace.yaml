# pnpm 11 reads its config from here, not .npmrc.

# electron-builder + native modules (system-ocr, onnxruntime, sharp) don't
# package correctly from pnpm's default symlinked store
nodeLinker: hoisted

# min age (in minutes) before a new release may be installed; 2880 = 48h.
# cheap protection against freshly-compromised package versions
minimumReleaseAge: 2880

overrides:
  adm-zip: ^0.6.0
  esbuild: ^0.25.11

# only these packages may run postinstall/build scripts
allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  koffi: true
  onnxruntime-node: true
  sharp: true
