<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://warframe.market; connect-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'none';"
    />
    <title>Trade Notification</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="trade-notification.css" />
  </head>
  <body>
    <div id="notification" class="hidden">
      <div id="icon-area">
        <img id="item-thumb" alt="" />
      </div>
      <div id="info-area">
        <div id="top-line">
          <span id="trade-label">Trade Finished</span>
          <span id="trade-badge"></span>
        </div>
        <div id="item-name"></div>
        <div id="bottom-line">
          <span id="plat-amount"></span>
          <span id="partner-name"></span>
        </div>
      </div>
    </div>
    <script src="trade-notification.js"></script>
  </body>
</html>
