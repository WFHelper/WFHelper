<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'none';"
    />
    <title>OCR Crop Debugger</title>
    <link rel="stylesheet" href="crop-debug.css" />
  </head>
  <body>
    <div class="app">
      <section class="card header">
        <div>
          <div class="title">OCR Crop Debugger</div>
          <div class="subtitle">
            Drag vertically on the screenshot to select the reward band used by OCR.
          </div>
        </div>
        <button id="closeBtn" class="btn" type="button">Close</button>
      </section>

      <section class="card toolbar">
        <button id="resetBtn" class="btn" type="button">Reset To Current</button>
        <button id="applyBtn" class="btn success" type="button">Apply + Set Custom Preset</button>
        <div class="spacer"></div>
        <div class="stats">
          <span>Top: <strong id="topRatio">-</strong></span>
          <span>Height: <strong id="heightRatio">-</strong></span>
          <span>Bottom: <strong id="bottomRatio">-</strong></span>
          <span>Source: <strong id="sourceInfo">-</strong></span>
        </div>
      </section>

      <section class="card viewer-wrap">
        <div id="viewer" class="viewer" title="Click and drag vertically to select OCR band">
          <img id="frameImage" alt="Warframe capture" />
          <svg class="band-overlay" viewBox="0 0 1 1" preserveAspectRatio="none" aria-hidden="true">
            <rect id="band" class="band" x="0" y="0.38" width="1" height="0.36"></rect>
          </svg>
        </div>
      </section>

      <section class="card footer">
        <div id="status" class="status">Waiting for capture...</div>
        <div><span class="kbd">Enter</span> apply, <span class="kbd">Esc</span> close</div>
      </section>
    </div>

    <script src="crop-debug.js"></script>
  </body>
</html>
