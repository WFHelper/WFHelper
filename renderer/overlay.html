<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: https:; connect-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'none';"
    />
    <title>Relic Overlay</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div id="panel">
      <div id="header">
        <div>
          <div id="header-title">&#9671; Relic Reward</div>
          <div id="header-sub">Detecting...</div>
        </div>
        <button id="btn-close" title="Close">&times;</button>
      </div>

      <div id="scanning-state" class="visible">
        <div class="scan-spinner"></div>
        <div id="scanning-text">Reading reward screen...</div>
      </div>

      <div id="slots-grid" class="is-hidden">
        <div class="reward-slot empty-slot" data-slot="0">
          <div class="slot-player">Slot 1</div>
          <div class="slot-name empty">-</div>
          <div class="slot-price-row">
            <span class="slot-rarity"></span>
            <span class="slot-price muted">-</span>
          </div>
        </div>
        <div class="reward-slot empty-slot" data-slot="1">
          <div class="slot-player">Slot 2</div>
          <div class="slot-name empty">-</div>
          <div class="slot-price-row">
            <span class="slot-rarity"></span>
            <span class="slot-price muted">-</span>
          </div>
        </div>
        <div class="reward-slot empty-slot" data-slot="2">
          <div class="slot-player">Slot 3</div>
          <div class="slot-name empty">-</div>
          <div class="slot-price-row">
            <span class="slot-rarity"></span>
            <span class="slot-price muted">-</span>
          </div>
        </div>
        <div class="reward-slot empty-slot" data-slot="3">
          <div class="slot-player">Slot 4</div>
          <div class="slot-name empty">-</div>
          <div class="slot-price-row">
            <span class="slot-rarity"></span>
            <span class="slot-price muted">-</span>
          </div>
        </div>
      </div>

      <div id="error-banner">OCR failed to detect reward items from the current screen.</div>

      <div id="best-footer">
        <span id="best-label">Best:</span>
        <span id="best-value">Detecting...</span>
      </div>
    </div>
    <script src="overlay.js"></script>
  </body>
</html>
